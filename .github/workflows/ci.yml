name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx ruff bandit pip-audit

      - name: Ruff (lint)
        run: ruff check .

      - name: Bandit (security scan)
        run: bandit -r main.py database.py parser.py watcher.py collector.py -s B101 -q

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --strict
        continue-on-error: true

      - name: Pytest
        run: python -m pytest tests/ -v --tb=short

  js-build:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Syntax check source files
        run: |
          for f in static/app.js static/charts.js static/sessions.js \
                   static/overview.js static/plan.js static/subagents.js \
                   static/timeline.js; do
            node --check "$f"
          done
      - name: Build bundle
        run: npm run build
