<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Codex Dashboard</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard Variable',system-ui,sans-serif;
    background:#0a0a0a;
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card{
    width:380px;
    max-width:90vw;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    border-radius:20px;
    padding:40px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    backdrop-filter:blur(20px);
  }
  .logo{
    width:48px;height:48px;
    margin:0 auto 20px;
    border-radius:14px;
    background:linear-gradient(135deg,#34d399 0%,#065f46 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:800;color:#fff;
    box-shadow:0 4px 16px rgba(52,211,153,.25);
  }
  h1{
    text-align:center;
    font-size:18px;
    font-weight:700;
    color:rgba(255,255,255,.85);
    margin-bottom:4px;
  }
  .subtitle{
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,.3);
    margin-bottom:28px;
  }
  label{
    display:block;
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:rgba(255,255,255,.35);
    margin-bottom:6px;
  }
  input[type="password"]{
    width:100%;
    padding:12px 16px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.04);
    color:#fff;
    font-size:14px;
    outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  input[type="password"]:focus{
    border-color:rgba(52,211,153,.5);
    box-shadow:0 0 0 3px rgba(52,211,153,.1);
  }
  input[type="password"]::placeholder{color:rgba(255,255,255,.15)}
  .btn{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#34d399;
    color:#064e3b;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:transform .15s cubic-bezier(.16,1,.3,1),opacity .15s;
  }
  .btn:hover{transform:scale(1.01)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .error{
    margin-top:14px;
    padding:10px 14px;
    border-radius:10px;
    background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.25);
    color:#fca5a5;
    font-size:12px;
    text-align:center;
    display:none;
  }
  .error.show{display:block;animation:shake .4s ease-in-out}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-6px)}
    40%,80%{transform:translateX(6px)}
  }
  .footer{
    text-align:center;
    margin-top:24px;
    font-size:10px;
    color:rgba(255,255,255,.15);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">C</div>
    <h1>Codex Dashboard</h1>
    <div class="subtitle">Sign in to continue</div>
    <form id="loginForm" autocomplete="on">
      <label for="pw">Password</label>
      <input type="password" id="pw" name="password" placeholder="Enter password" autofocus required>
      <button type="submit" class="btn" id="submitBtn">Sign in</button>
    </form>
    <div class="error" id="errorMsg"></div>
    <div class="footer">Codex Usage Dashboard</div>
  </div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in\u2026';
  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await resp.json();
    if (data.ok) {
      window.location.href = '/';
      return;
    }
    err.textContent = data.error || 'Invalid password';
    err.classList.add('show');
    document.getElementById('pw').select();
  } catch (ex) {
    err.textContent = 'Network error';
    err.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = 'Sign in';
});
// If already authenticated, redirect to dashboard
fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.authenticated) window.location.href = '/';
});
</script>
</body>
</html>
